<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whispr</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #020100; overflow: hidden; 
            font-family: 'Shadows Into Light', cursive; color: white;
            user-select: none; touch-action: none;
        }

        /* --- SPLASH SCREEN --- */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020100; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .splash-logo { width: 220px; margin-bottom: 5px; filter: drop-shadow(0 0 20px #ffaa00); }
        .splash-tagline { font-size: 1.4rem; color: #ffca99; margin-bottom: 30px; opacity: 0.8; }
        .go-btn {
            background: transparent; border: 1px solid #ffaa00; color: #ffca99;
            padding: 10px 50px; border-radius: 30px; font-family: inherit;
            font-size: 1.5rem; cursor: pointer;
        }

        /* --- MAIN UI --- */
        #mainContent { opacity: 0; transition: opacity 1s ease; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #introLayer {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 1s ease;
        }
        .main-logo { width: 140px; margin-bottom: 5px; filter: drop-shadow(0 0 20px #ffaa00); }
        .prompt-text {
            display: inline-block; font-size: 1.8rem; color: #ffca99;
            cursor: pointer; background: rgba(255, 255, 255, 0.08);
            padding: 10px 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .instruction-text {
            margin-top: 15px; font-size: 0.95rem; color: rgba(255, 202, 153, 0.5);
            letter-spacing: 1px;
        }

        #netCursor {
            position: fixed; pointer-events: none; z-index: 9999;
            width: 60px; height: 60px;
            border: 1.5px solid #fff; border-radius: 50%;
            display: none; margin-left: -80px; margin-top: -110px;
        }
        #netCursor::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 4px; height: 120px; 
            background: linear-gradient(to bottom, #5d4037, #1a0f0a);
            transform-origin: top center; transform: rotate(-35deg);
            border-radius: 2px;
        }

        #netDock {
            position: fixed; bottom: 30px; right: 30px;
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        .wrapper {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        .wrapper.active { opacity: 1; pointer-events: auto; }

        .container {
            background: rgba(10, 5, 0, 0.98); padding: 35px; border-radius: 35px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .label { display: block; text-align: left; color: #ffca99; font-size: 0.9rem; margin-bottom: 2px; opacity: 0.7; }
        input, textarea { 
            width: 100%; background: transparent; border: none; 
            border-bottom: 1px solid #333; color: #fff; padding: 8px; 
            font-family: inherit; margin-bottom: 15px; font-size: 1.2rem;
        }
        button { background: #ff4500; border: none; color: #000; padding: 12px 60px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }

        .word-soul {
            position: fixed; pointer-events: none; z-index: 250; font-size: 1.8rem;
            color: #ffca99; text-shadow: 0 0 15px #ff4500; opacity: 0;
        }

        #popupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 500;
            display: none; align-items: center; justify-content: center;
            padding: 40px; text-align: center; font-size: 1.8rem; color: #ffca99;
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="https://i.imgur.com/7vlpCCX.png" class="splash-logo">
        <div class="splash-tagline">Where every whisper becomes a star.</div>
        <button class="go-btn" onclick="enterSite()">GO</button>
    </div>

    <div id="mainContent">
        <canvas id="canvas"></canvas>
        <div id="netDock" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            <div style="width:25px; height:25px; border:1px solid #fff; border-radius:50%;"></div>
        </div>
        <div id="netCursor"></div>
        <div id="introLayer">
            <img src="https://i.imgur.com/7vlpCCX.png" class="main-logo">
            <div class="prompt-text" onclick="openRelease()">Release a Whisper</div>
            <div class="instruction-text">Drag the net to catch a soul's memory</div>
        </div>
        <div id="popupOverlay" onclick="this.style.display='none'"></div>
        <div class="wrapper" id="mainBox">
            <div class="container">
                <form id="whisperForm">
                    <span class="label">To:</span>
                    <input type="text" id="dear" placeholder="Someone in the stars...">
                    <span class="label">Message:</span>
                    <textarea id="message" placeholder="Whisper your heart out..." required></textarea>
                    <span class="label">From:</span>
                    <input type="text" id="from" placeholder="A quiet soul...">
                    <button type="submit" id="submitBtn">Release</button>
                </form>
                <p onclick="closeRelease()" style="margin-top:20px; opacity:0.3; font-size:0.9rem; cursor:pointer;">Nevermind</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwK1RRHI_Zg07AdZ8mryaHJu0Lq52d9KI8hrhAHrrtWMtxZGeYjLxDsG8zo7HsOOLXktA/exec';
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const net = document.getElementById('netCursor'), intro = document.getElementById('introLayer'), wrapper = document.getElementById('mainBox');
        let particles = [], dragging = false, mouseX = 0, mouseY = 0;

        function enterSite() {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('mainContent').style.opacity = '1';
                init();
                animate(); // Eto yung nawala kanina boi
            }, 800);
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<220; i++) particles.push(new Particle()); 
        }

        class Particle {
            constructor() {
                this.isCarrier = Math.random() > 0.9;
                this.x = Math.random() * canvas.width;
                this.y = this.isCarrier ? Math.random() * (canvas.height * 0.45) : Math.random() * canvas.height;
                this.size = this.isCarrier ? 4.2 : 2;
                this.vx = (Math.random() - 0.5) * 0.4; 
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fillStyle = this.isCarrier ? "#ffca99" : "#ff330088";
                if(this.isCarrier) { ctx.shadowBlur = 12; ctx.shadowColor = "#fff"; }
                ctx.fill(); ctx.shadowBlur = 0;
            }
            update() {
                if(this.isCarrier && dragging) {
                    const netCircleX = mouseX - 80, netCircleY = mouseY - 110;
                    const d = Math.hypot(this.x - netCircleX, this.y - netCircleY);
                    if(d < 120) {
                        this.vx += (this.x - netCircleX) * 0.0003;
                        this.vy += (this.y - netCircleY) * 0.0003;
                    }
                    if(d < 30) {
                        particles.splice(particles.indexOf(this), 1);
                        dragging = false; net.style.display = 'none';
                        catchSoul();
                    }
                }
                this.x += this.vx; this.y += this.vy;
                if(this.x<0 || this.x>canvas.width) this.vx *= -1;
                if(this.y<0 || this.y>canvas.height) this.vy *= -1;
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function startDrag(e) { dragging = true; net.style.display = 'block'; updateMouse(e); }
        function updateMouse(e) {
            mouseX = e.touches ? e.touches[0].clientX : e.clientX;
            mouseY = e.touches ? e.touches[0].clientY : e.clientY;
            net.style.left = mouseX + 'px'; net.style.top = mouseY + 'px';
        }
        window.onmousemove = (e) => { if(dragging) updateMouse(e); };
        window.ontouchmove = (e) => { if(dragging) updateMouse(e); };
        window.onmouseup = window.ontouchend = () => { dragging = false; net.style.display = 'none'; };

        async function catchSoul() {
            const overlay = document.getElementById('popupOverlay');
            overlay.style.display = 'flex';
            overlay.innerText = "...finding a whisper...";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                overlay.innerText = data.message || "Silence...";
            } catch(e) { overlay.innerText = "The light faded."; }
        }

        function openRelease() { wrapper.classList.add('active'); intro.style.opacity = '0'; }
        function closeRelease() { wrapper.classList.remove('active'); intro.style.opacity = '1'; }

        document.getElementById('whisperForm').onsubmit = function(e) {
            e.preventDefault();
            const msg = document.getElementById('message').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            wrapper.classList.remove('active');
            const words = msg.split(' ');
            let completed = 0;
            words.forEach((w, i) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'word-soul'; el.innerText = w;
                    el.style.left = '50%'; el.style.top = '50%';
                    document.body.appendChild(el);
                    const anim = el.animate([
                        { opacity: 0, transform: 'translate(-50%, -50%) scale(0.9)' },
                        { opacity: 1, offset: 0.15 },
                        { opacity: 0, transform: `translate(${(Math.random()-0.5)*250}px, -220px) scale(0.6)` }
                    ], { duration: 5500, easing: 'ease-out' });
                    anim.onfinish = () => {
                        el.remove(); particles.push(new Particle());
                        completed++;
                        if(completed === words.length) {
                            setTimeout(() => { intro.style.opacity = '1'; btn.disabled = false; document.getElementById('whisperForm').reset(); }, 2000);
                        }
                    };
                }, i * 280);
            });
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({message: msg})});
        };

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
