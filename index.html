<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whispers | Magnetic Ember</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050200; overflow: hidden; 
            font-family: 'Shadows Into Light', cursive; color: white;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* ULTRA TRANSPARENT UI */
        .wrapper {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; z-index: 100;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s ease;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 30px; border-radius: 40px;
            border: 1px solid rgba(255, 69, 0, 0.1);
            text-align: center;
        }

        .logo { width: 100px; margin-bottom: 20px; opacity: 0.7; filter: drop-shadow(0 0 8px #ff4500); }

        input, textarea {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255, 69, 0, 0.2);
            margin-bottom: 15px; padding: 10px; color: #fff;
            font-family: inherit; font-size: 1.1rem; outline: none;
            transition: border-bottom 0.5s;
        }
        input:focus, textarea:focus { border-bottom: 1px solid #ff4500; }
        textarea { height: 90px; resize: none; }
        
        button {
            background: transparent; border: 1px solid rgba(255, 69, 0, 0.5);
            color: #ff4500; padding: 12px 40px; border-radius: 50px;
            font-family: inherit; font-size: 1.3rem; cursor: pointer;
            transition: 0.4s; margin-top: 10px;
        }
        button:hover { background: #ff4500; color: #000; box-shadow: 0 0 30px rgba(255, 69, 0, 0.6); }

        .fade-out { opacity: 0; transform: translate(-50%, -55%) scale(0.95); pointer-events: none; }

        .word-float {
            position: fixed; pointer-events: none; z-index: 200;
            font-size: 2.2rem; color: #fff; 
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff4500;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="wrapper" id="mainBox">
        <div class="container">
            <img src="https://i.imgur.com/7vlpCCX.png" class="logo" alt="Whispers">
            <form id="whisperForm">
                <input type="text" id="dear" placeholder="Dear someone..." autocomplete="off">
                <textarea id="message" placeholder="Whisper your unsaid words..." required></textarea>
                <input type="text" id="from" placeholder="Sincerely," autocomplete="off">
                <button type="submit" id="releaseBtn">Release</button>
            </form>
        </div>
    </div>

    <script>
        // --- GOOGLE SPREADSHEET URL ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwt-VVOW1VP8Q1u1eGo_2dMKVQ8EZhTM0fSt7HkRBxTfNEfYmbTamXZzaN5pLQv2WT1/exec';

        // --- FIREFLY ENGINE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mainBox = document.getElementById('mainBox');
        const form = document.getElementById('whisperForm');
        let particles = [];
        let mouse = { x: -1000, y: -1000, active: false };
        const particleCount = 180; 

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1.5; 
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.angle = Math.random() * Math.PI * 2;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 69, 0, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ff4500";
                ctx.fill();
            }
            update() {
                this.x += this.vx + Math.sin(this.angle) * 0.3;
                this.y += this.vy + Math.cos(this.angle) * 0.3;
                this.angle += 0.01;
                if (mouse.active) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 350) {
                        let force = (350 - dist) / 350;
                        this.x += (dx / dist) * force * 4.5;
                        this.y += (dy / dist) * force * 4.5;
                    }
                }
                if (this.x < -10) this.x = canvas.width + 10;
                if (this.x > canvas.width + 10) this.x = -10;
                if (this.y < -10) this.y = canvas.height + 10;
                if (this.y > canvas.height + 10) this.y = -10;
            }
        }

        function setup() {
            particles = [];
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const handleDown = (e) => {
            mouse.active = true;
            mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        const handleMove = (e) => {
            mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        const handleUp = () => { mouse.active = false; };

        window.addEventListener('mousedown', handleDown);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);
        window.addEventListener('touchstart', handleDown);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleUp);
        window.addEventListener('resize', initCanvas);

        // --- SUBMISSION ---
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const data = {
                dear: document.getElementById('dear').value,
                message: document.getElementById('message').value,
                from: document.getElementById('from').value,
                timestamp: new Date().toLocaleString()
            };

            // Send to Spreadsheet
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Start Animation
            const words = data.message.split(/\s+/);
            mainBox.classList.add('fade-out');

            words.forEach((word, i) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'word-float';
                    el.innerText = word;
                    el.style.left = '50%'; el.style.top = '50%';
                    document.body.appendChild(el);
                    const driftX = (Math.random() - 0.5) * 400;
                    el.animate([
                        { transform: 'translate(-50%, -50%) scale(0.6)', opacity: 0 },
                        { transform: `translate(calc(-50% + ${driftX/2}px), -20vh) scale(1.1)`, opacity: 1, offset: 0.2 },
                        { transform: `translate(calc(-50% + ${driftX}px), -110vh) scale(1.8)`, opacity: 0 }
                    ], { duration: 7500, easing: 'ease-in-out', fill: 'forwards' });
                    setTimeout(() => el.remove(), 7500);
                }, i * 450);
            });

            setTimeout(() => {
                form.reset();
                mainBox.classList.remove('fade-out');
            }, (words.length * 450) + 6500);
        });

        initCanvas(); setup(); animate();
    </script>
</body>
</html>
