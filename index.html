<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers | Eternal Storage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
body { font-family: 'Shadows Into Light', cursive; color: white; display: flex; justify-content: center; align-items: center; position: relative; }

/* SMOKE EFFECT */
.smoke-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.35; background: #0d0d0d; filter: url(#smokeFilter); pointer-events: none; }

/* FIREFLIES */
.firefly { position: fixed; width: 4px; height: 4px; background: #ffca28; border-radius: 50%; box-shadow: 0 0 10px 2px #ffca28; z-index: 2; pointer-events: none; opacity: 0; }

/* CONTAINER & LOGO */
.wrapper { width: 95%; max-width: 650px; z-index: 10; position: relative; }
.container { 
    background: rgba(15, 15, 22, 0.85); 
    backdrop-filter: blur(30px); 
    padding: 40px 50px; 
    border-radius: 40px; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    box-shadow: 0 20px 80px rgba(0,0,0,0.9); 
    text-align: center;
    transition: opacity 1.5s ease, transform 1.5s ease; /* Para smooth ang pagkawala */
}

/* ETO ANG CLASS NA MAGPAPALAYAS SA BOX */
.container.fade-out {
    opacity: 0;
    transform: scale(0.95) translateY(-20px);
    pointer-events: none;
}

.logo { width: 240px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); display: inline-block; }

textarea, input { width: 100%; padding: 18px; margin-bottom: 20px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: #fff; font-family: 'Shadows Into Light', cursive; font-size: 24px; outline: none; }
textarea { height: 200px; resize: none; }
button { width: 100%; padding: 22px; background: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 1.8rem; font-family: 'Shadows Into Light', cursive; font-weight: bold; transition: 0.5s; }
button:hover { background: #f0f0f0; transform: scale(1.02); }
button:disabled { background: #444; color: #888; cursor: not-allowed; }

/* FLOATING WORDS */
.particle { position: fixed; font-size: 36px; color: rgba(255, 255, 255, 0.9); text-shadow: 0 0 20px #fff, 0 0 40px rgba(255, 255, 255, 0.3); pointer-events: none; white-space: nowrap; z-index: 9999; animation: slowMoScatter var(--duration) cubic-bezier(0.1, 0.85, 0.25, 1) forwards; }
@keyframes slowMoScatter { 0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 5% { opacity: 1; } 100% { transform: translate(calc(-50% + var(--drift)), -115vh) rotate(var(--rotation)) scale(2.2); opacity: 0; } }
</style>
</head>
<body>

<svg style="display:none;"><filter id="smokeFilter"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2"><animate attributeName="seed" from="1" to="100" dur="80s" repeatCount="indefinite" /></feTurbulence><feDisplacementMap in="SourceGraphic" scale="25" /></filter></svg>
<div class="smoke-overlay"></div>

<div class="wrapper">
    <div class="container" id="mainBox">
        <img src="https://i.imgur.com/7vlpCCX.png" class="logo" alt="Whispers Logo">
        <form id="letterForm">
            <input type="text" name="to" placeholder="Dear..." autocomplete="off">
            <textarea name="message" placeholder="Whisper your unsaid words..." required></textarea>
            <input type="text" name="from" placeholder="Sincerely," autocomplete="off">
            <button type="submit" id="releaseBtn">Release Whisper</button>
        </form>
    </div>
</div>

<script>
const form = document.getElementById("letterForm");
const releaseBtn = document.getElementById("releaseBtn");
const mainBox = document.getElementById("mainBox"); // Reference sa box

const scriptURL = 'https://script.google.com/macros/s/AKfycbw5pyoyFoIxRU0WkemouAHmmpecQT3Fk1n10ePD4gsEkZAEte3Jhew2JrB07tcCeM9cbw/exec';

// FIREFLIES
for (let i = 0; i < 40; i++) {
    const firefly = document.createElement("div");
    firefly.className = "firefly";
    firefly.style.left = Math.random() * 100 + "vw";
    firefly.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(firefly);
    firefly.animate([{ opacity: 0, transform: 'scale(0.5)' }, { opacity: 0.8, transform: `translate(${(Math.random()-0.5)*200}px, ${(Math.random()-0.5)*200}px) scale(1)` }, { opacity: 0, transform: `translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px) scale(0.5)` }], { duration: 7000 + Math.random() * 5000, iterations: Infinity });
}

function createWord(word, startX, startY) {
    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = word;
    p.style.left = startX + "px";
    p.style.top = startY + "px";
    const drift = (Math.random() - 0.5) * 1100;
    const duration = 22 + Math.random() * 10;
    const rotation = (Math.random() - 0.5) * 180;
    p.style.setProperty('--drift', `${drift}px`);
    p.style.setProperty('--duration', `${duration}s`);
    p.style.setProperty('--rotation', `${rotation}deg`);
    document.body.appendChild(p);
    setTimeout(() => p.remove(), duration * 1000);
}

form.addEventListener("submit", (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const message = form.querySelector('textarea').value;
    const rect = releaseBtn.getBoundingClientRect();
    const words = message.split(/\s+/);

    releaseBtn.innerText = "Releasing...";
    releaseBtn.disabled = true;

    fetch(scriptURL, { method: 'POST', body: formData })
      .then(response => {
          // 1. DITO NATIN PAPALAYASIN YUNG BOX
          mainBox.classList.add('fade-out');

          // 2. LILIPAD NA ANG MGA SALITA
          words.forEach((word, index) => {
              setTimeout(() => {
                  createWord(word, rect.left + rect.width / 2, rect.top);
              }, index * 800); 
          });
          
          // 3. IBALIK ANG BOX PAGKATAPOS NG 25 SECONDS
          setTimeout(() => {
              form.reset();
              mainBox.classList.remove('fade-out');
              releaseBtn.innerText = "Release Whisper";
              releaseBtn.disabled = false;
          }, 25000);
      })
      .catch(error => {
          console.error('Error!', error.message);
          releaseBtn.innerText = "Release Whisper";
          releaseBtn.disabled = false;
      });
});
</script>
</body>
  </html>
